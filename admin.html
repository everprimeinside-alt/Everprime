<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EverPrime | Admin Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        @import url('https://fonts.cdnfonts.com/css/syncopate');
        body { font-family: 'BPG Phone Sans Bold', sans-serif; background: #050505; color: white; overflow-x: hidden; }
        .font-sync { font-family: 'Syncopate', sans-serif; }
        #alarm-overlay { display: none; }
        #alarm-overlay.active { display: flex; animation: bg-flash 0.5s infinite alternate; }
        @keyframes bg-flash {
            from { background-color: rgba(220, 38, 38, 0.95); }
            to { background-color: rgba(153, 27, 27, 0.98); }
        }
        .admin-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px); }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #000; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #ff0000; }
        
        .admin-section { display: none; }
        .admin-section.active { display: block; }
        .nav-btn.active { background: #dc2626; color: white; border-color: #dc2626; }
        
        input, textarea, select { background: rgba(255,255,255,0.05) !important; border: 1px solid rgba(255,255,255,0.1) !important; color: white !important; }
        input:focus, textarea:focus, select:focus { border-color: #dc2626 !important; outline: none; }
        option { background: #050505; color: white; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div id="alarm-overlay" class="fixed inset-0 z-[9999] flex-col items-center justify-center text-center p-6 backdrop-blur-xl">
        <div class="mb-6 animate-bounce"><span class="material-icons text-9xl text-white">warning</span></div>
        <h2 class="font-sync text-5xl md:text-7xl font-black italic mb-8 text-white uppercase tracking-tighter">New Order</h2>
        <div id="alarm-details" class="bg-black p-10 border-4 border-white text-left max-w-2xl w-full"></div>
        <button onclick="document.getElementById('alarm-overlay').classList.remove('active')" class="mt-8 bg-white text-black px-8 py-3 font-bold uppercase italic">გათიშვა</button>
    </div>

    <header class="flex flex-col md:flex-row justify-between items-center border-b border-red-600 pb-8 mb-8 gap-6">
        <div>
            <h1 class="font-sync text-3xl font-black italic uppercase tracking-tighter">Ever<span class="text-red-600">Prime</span></h1>
            <p class="text-[10px] uppercase tracking-[0.5em] opacity-50">Control Center v2.6</p>
        </div>
        <div id="user-stats" class="text-green-500 text-xs font-bold uppercase italic animate-pulse">კავშირი...</div>
    </header>

    <nav class="flex flex-wrap gap-2 mb-10">
        <button onclick="showSection('orders-sec', this)" class="nav-btn active border border-white/10 px-4 py-2 text-[10px] uppercase font-bold transition">შეკვეთები</button>
        <button onclick="showSection('users-sec', this)" class="nav-btn border border-white/10 px-4 py-2 text-[10px] uppercase font-bold transition">მომხმარებლები</button>
        <button onclick="showSection('upload-sec', this)" class="nav-btn border border-white/10 px-4 py-2 text-[10px] uppercase font-bold transition">პროდუქტის დამატება</button>
        <button onclick="showSection('delete-sec', this)" class="nav-btn border border-white/10 px-4 py-2 text-[10px] uppercase font-bold transition">ინვენტარი</button>
    </nav>

    <main>
        <section id="orders-sec" class="admin-section active">
            <h2 class="font-sync text-xs text-red-600 mb-6 uppercase tracking-widest italic">Recent Orders</h2>
            <div id="orders-list" class="space-y-4 max-h-[70vh] overflow-y-auto pr-4 custom-scrollbar"></div>
        </section>

        <section id="users-sec" class="admin-section">
            <div class="mb-6">
                <input id="user-search" type="text" placeholder="მოძებნე მომხმარებელი..." class="w-full p-4 text-sm uppercase tracking-widest">
            </div>
            <div id="users-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
        </section>

        <section id="upload-sec" class="admin-section">
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 max-w-6xl mx-auto">
                
                <div class="admin-card p-8 border-l-4 border-red-600">
                    <h2 class="font-sync text-xs mb-8 text-white italic uppercase tracking-[0.2em]">Product Details</h2>
                    <div class="grid grid-cols-1 gap-5">
                        <div>
                            <label class="text-[10px] text-gray-500 uppercase font-bold block mb-2">დასახელება</label>
                            <input id="p-name" type="text" placeholder="მაგ: Whey Protein" class="w-full p-3 text-sm">
                        </div>
                        
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="text-[10px] text-gray-500 uppercase font-bold block mb-2">მიმდინარე ფასი (₾)</label>
                                <input id="p-price" type="number" placeholder="0.00" class="w-full p-3 text-sm">
                            </div>
                            <div>
                                <label class="text-[10px] text-gray-500 uppercase font-bold block mb-2">ძველი ფასი (₾)</label>
                                <input id="p-oldprice" type="number" placeholder="0.00" class="w-full p-3 text-sm">
                            </div>
                        </div>

                        <div>
                            <label class="text-[10px] text-gray-500 uppercase font-bold block mb-2">კატეგორია</label>
                            <select id="p-category" class="w-full p-3 text-sm"></select>
                        </div>

                        <div>
                            <label class="text-[10px] text-gray-500 uppercase font-bold block mb-2">სურათების ლინკები (გამოყავით მძიმით ",")</label>
                            <input id="p-image" type="text" placeholder="link1, link2, link3" class="w-full p-3 text-sm">
                        </div>

                        <div>
                            <label class="text-[10px] text-gray-500 uppercase font-bold block mb-2">აღწერა</label>
                            <textarea id="p-desc" rows="4" placeholder="პროდუქტის აღწერა..." class="w-full p-3 text-sm"></textarea>
                        </div>

                        <button onclick="window.uploadProduct()" class="w-full bg-red-600 py-4 font-sync text-[10px] font-black uppercase italic hover:bg-red-700 transition">
                            პროდუქტის შენახვა
                        </button>
                    </div>
                </div>

                <div class="admin-card p-8 border-l-4 border-blue-600">
                    <h2 class="font-sync text-xs mb-8 text-white italic uppercase tracking-[0.2em]">Manage Categories</h2>
                    <div class="flex gap-2 mb-6">
                        <input id="new-cat-name" type="text" placeholder="ახალი კატეგორია..." class="flex-1 p-3 text-sm">
                        <button onclick="window.addCategory()" class="bg-blue-600 px-6 font-bold uppercase text-xs italic">დამატება</button>
                    </div>
                    <div id="categories-list" class="space-y-2 max-h-64 overflow-y-auto custom-scrollbar"></div>
                </div>

            </div>
        </section>

        <section id="delete-sec" class="admin-section">
            <h2 class="font-sync text-xs text-gray-500 mb-6 uppercase tracking-widest italic">Inventory & Stock Status</h2>
            <div id="inventory-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
        </section>
    </main>

    <script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
import { getFirestore, collection, onSnapshot, query, doc, getDoc, deleteDoc, orderBy, addDoc, setDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";
import { getDatabase, ref, onValue, onChildAdded, limitToLast, query as rQuery } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

const firebaseConfig = {
    apiKey: "AIzaSyD8enMds5C_R-uD2atgLRf7TPQ4N6u843E",
    authDomain: "evverprrime.firebaseapp.com",
    databaseURL: "https://evverprrime-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "evverprrime",
    storageBucket: "evverprrime.firebasestorage.app",
    messagingSenderId: "738169841658",
    appId: "1:738169841658:web:5de9ecdda0f0f68f4ae643"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const rtdb = getDatabase(app);

let allUsers = [];
let currentEditId = null; 

// --- სექციების გადართვა ---
window.showSection = (id, btn) => {
    document.querySelectorAll('.admin-section').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    if(btn) btn.classList.add('active');
};

// --- წაშლის ფუნქცია ---
window.delDoc = async (coll, id) => {
    if(confirm(`ნამდვილად გსურთ წაშლა?`)) {
        try { await deleteDoc(doc(db, coll, id)); } catch (e) { alert(e.message); }
    }
};

// --- პროდუქტის შენახვა (სლაიდერის ლოგიკით) ---
window.uploadProduct = async () => {
    const name = document.getElementById('p-name').value;
    const price = document.getElementById('p-price').value;
    const oldPrice = document.getElementById('p-oldprice')?.value;
    const imagesRaw = document.getElementById('p-image').value;
    const desc = document.getElementById('p-desc').value;
    const category = document.getElementById('p-category').value;
    
    if(!name || !price || !category) return alert("შეავსეთ აუცილებელი ველები!");

    // აქ ხდება სლაიდშოუს მაგია: მძიმით გამოყოფილ ლინკებს ვაქცევთ მასივად
    const imagesArray = imagesRaw.split(',')
        .map(link => link.trim())
        .filter(link => link !== "" && link.startsWith('http'));

    const productData = { 
        name, 
        price: Number(price), 
        oldPrice: oldPrice ? Number(oldPrice) : null,
        images: imagesArray, // ეს მასივი აუცილებელია სლაიდერისთვის
        image: imagesArray[0] || '', // პირველი ფოტო ხდება მთავარი
        desc, 
        category, 
        inStock: true,
        updatedAt: Date.now() 
    };

    try {
        if(currentEditId) {
            // რედაქტირება
            await setDoc(doc(db, "products", currentEditId), productData);
            alert("პროდუქტი წარმატებით განახლდა!");
            currentEditId = null;
        } else {
            // ახლის დამატება
            productData.createdAt = Date.now();
            await addDoc(collection(db, "products"), productData);
            alert("პროდუქტი წარმატებით დაემატა!");
        }
        resetProductForm();
    } catch (e) { alert("შეცდომა: " + e.message); }
};

function resetProductForm() {
    ['p-name', 'p-price', 'p-oldprice', 'p-image', 'p-desc'].forEach(id => {
        const el = document.getElementById(id);
        if(el) el.value = '';
    });
    currentEditId = null;
}

// --- რედაქტირების დაწყება ---
window.startEdit = (id, data) => {
    currentEditId = id;
    document.getElementById('p-name').value = data.name || '';
    document.getElementById('p-price').value = data.price || '';
    document.getElementById('p-oldprice').value = data.oldPrice || '';
    // ლინკებს ვაბრუნებთ ისევ მძიმით გამოყოფილ ტექსტად ინპუტში
    document.getElementById('p-image').value = data.images ? data.images.join(', ') : data.image;
    document.getElementById('p-desc').value = data.desc || '';
    document.getElementById('p-category').value = data.category || '';
    
    window.showSection('upload-sec');
    window.scrollTo({ top: 0, behavior: 'smooth' });
};

// --- მარაგის მართვა ---
window.toggleStock = async (id, currentStatus) => {
    try {
        await setDoc(doc(db, "products", id), { inStock: !currentStatus }, { merge: true });
    } catch (e) { console.error(e); }
};

// --- კატეგორიები ---
window.addCategory = async () => {
    const name = document.getElementById('new-cat-name').value.trim();
    if(!name) return;
    try { 
        await addDoc(collection(db, "categories"), { name }); 
        document.getElementById('new-cat-name').value = ''; 
    } catch (e) { alert(e.message); }
};

// --- მონაცემების მოსმენა (Real-time) ---
function loadAdminData() {
    // კატეგორიები
    onSnapshot(collection(db, "categories"), snap => {
        const select = document.getElementById('p-category');
        const list = document.getElementById('categories-list');
        if(!select || !list) return;
        select.innerHTML = ''; list.innerHTML = '';
        snap.forEach(d => {
            const cat = d.data().name;
            select.innerHTML += `<option value="${cat}">${cat}</option>`;
            list.innerHTML += `<div class="flex justify-between items-center p-2 bg-white/5 border border-white/5"><span class="text-xs uppercase">${cat}</span><button onclick="window.delDoc('categories', '${d.id}')" class="text-red-600 material-icons text-sm">delete</button></div>`;
        });
    });

    // შეკვეთები
    onSnapshot(query(collection(db, "orders"), orderBy("timestamp", "desc")), snap => {
        const list = document.getElementById('orders-list');
        if(!list) return;
        list.innerHTML = '';
        snap.forEach(d => {
            const o = d.data();
            list.innerHTML += `
                <div class="p-4 bg-white/5 border-l-4 border-red-600 mb-2 flex justify-between items-center group">
                    <div>
                        <p class="text-white font-bold uppercase text-sm">${o.product}</p>
                        <p class="text-[10px] text-gray-500 uppercase">${o.address || 'N/A'} | ${o.phone || 'N/A'}</p>
                        <p class="text-[8px] text-red-500 uppercase">${o.time || ''}</p>
                    </div>
                    <button onclick="window.delDoc('orders', '${d.id}')" class="text-gray-700 hover:text-red-600 transition"><span class="material-icons">delete</span></button>
                </div>`;
        });
    });

    // ინვენტარი
    onSnapshot(collection(db, "products"), snap => {
        const list = document.getElementById('inventory-list');
        if(!list) return;
        list.innerHTML = '';
        snap.forEach(d => {
            const p = d.data();
            const inStock = p.inStock !== false;
            const mainImg = (p.images && p.images.length > 0) ? p.images[0] : (p.image || 'logo.jpg');
            
            list.innerHTML += `
                <div class="admin-card p-4 flex flex-col gap-3 border border-white/5">
                    <div class="flex justify-between items-start">
                        <div class="flex items-center gap-3">
                            <img src="${mainImg}" class="w-12 h-12 object-cover border border-white/10 bg-black">
                            <div>
                                <p class="text-xs font-bold text-white uppercase">${p.name}</p>
                                <p class="text-[10px] text-red-500">${p.price}₾</p>
                            </div>
                        </div>
                        <div class="flex gap-2">
                            <button onclick='window.startEdit("${d.id}", ${JSON.stringify(p).replace(/'/g, "&apos;")})' class="text-blue-500 material-icons text-sm hover:scale-125 transition">edit</button>
                            <button onclick="window.delDoc('products', '${d.id}')" class="text-red-600 material-icons text-sm opacity-50 hover:opacity-100">delete</button>
                        </div>
                    </div>
                    <button onclick="window.toggleStock('${d.id}', ${inStock})" 
                        class="w-full py-2 text-[9px] font-bold uppercase border transition-all ${inStock ? 'border-green-500 text-green-500 hover:bg-green-500/10' : 'border-gray-600 text-gray-600 hover:bg-gray-600/10'}">
                        ${inStock ? '● მარაგშია' : '○ ამოწურულია'}
                    </button>
                </div>`;
        });
    });

    // ახალი შეკვეთის ალერტი
    onChildAdded(rQuery(ref(rtdb, 'orders_live'), limitToLast(1)), (snap) => {
        const order = snap.val();
        if (order && (Date.now() - order.timestamp < 10000)) triggerAlarm(order);
    });

    // ონლაინ მომხმარებლები
    onValue(ref(rtdb, 'online_users'), s => {
        const userStats = document.getElementById('user-stats');
        if(userStats) userStats.innerHTML = `● LIVE USERS: ${s.exists() ? Object.keys(s.val()).length : 0}`;
    });

    // მომხმარებლების სია
    onSnapshot(collection(db, "users"), snap => {
        allUsers = [];
        snap.forEach(doc => allUsers.push({ id: doc.id, ...doc.data() }));
        renderUsers(allUsers);
    });
}

function renderUsers(usersArray) {
    const list = document.getElementById('users-list');
    if(!list) return;
    list.innerHTML = '';
    usersArray.forEach(u => {
        if(u.role === 'admin') return;
        list.innerHTML += `
            <div class="admin-card p-4 border-t-2 border-blue-600 relative">
                <h4 class="text-white font-bold text-xs truncate mb-1">${u.email}</h4>
                <p class="text-[10px] text-gray-500 font-mono italic">${u.phone || 'N/A'}</p>
                <p class="text-[9px] text-blue-400 mt-1 uppercase">${u.address || ''}</p>
                <button onclick="window.delDoc('users', '${u.id}')" class="absolute top-4 right-4 text-gray-800 hover:text-red-600 transition"><span class="material-icons text-sm">person_remove</span></button>
            </div>`;
    });
}

// --- შეტყობინების ფუნქცია (Alarm) ---
function triggerAlarm(data) {
    const overlay = document.getElementById('alarm-overlay');
    const details = document.getElementById('alarm-details');
    if(!overlay || !details) return;
    details.innerHTML = `
        <p class="text-white text-xl uppercase font-bold mb-2">📦 ${data.product}</p>
        <p class="text-green-500 font-mono text-sm">📍 მისამართი: ${data.address}</p>
        <p class="text-white/50 text-xs mt-2 italic">კონტაქტი: ${data.phone}</p>
    `;
    overlay.classList.add('active');
    const audio = new Audio('https://assets.mixkit.co/sfx/preview/mixkit-emergency-alert-alarm-1007.mp3');
    audio.play().catch(e => console.log("Audio play blocked"));
}

// --- ავტორიზაციის შემოწმება ---
onAuthStateChanged(auth, async (user) => {
    if (user) {
        const u = await getDoc(doc(db, "users", user.uid));
        if (u.exists() && u.data().role === 'admin') {
            loadAdminData();
        } else {
            window.location.href = "index.html"; 
        }
    } else {
        window.location.href = "index.html";
    }
});

// ძიების ფილტრი მომხმარებლებისთვის
document.getElementById('user-search')?.addEventListener('input', (e) => {
    const val = e.target.value.toLowerCase();
    renderUsers(allUsers.filter(u => 
        (u.email?.toLowerCase().includes(val)) || 
        (u.phone?.includes(val))
    ));
});

    </script>
</body>
</html>
